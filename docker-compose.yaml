version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - UV_CACHE_DIR=/app/.uv_cache # UV önbelleğini buraya yönlendir
    volumes:
      - llm_council_chats:/app/data
      - uv_cache:/app/.uv_cache # Önbelleği kalıcı yap
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_BASE=${VITE_API_BASE}
    restart: always
    depends_on:
      - backend

volumes:
  llm_council_chats:
  uv_cache: # Yeni kalıcı volume
